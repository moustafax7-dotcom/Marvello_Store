<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — Marvello</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="announcement">✦ Free Shipping on orders over EGP 2,000</div>
<nav class="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Marvello<span class="star">✦</span></a>
    <ul class="nav-menu">
      <li><a href="../index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
    </ul>
    <div class="nav-right">
      <a href="auth.html" class="nav-icon-btn"><i class="far fa-user"></i></a>
      <button class="nav-icon-btn wish-toggle" style="position:relative"><i class="far fa-heart"></i><span class="nav-badge wish-badge" style="display:none">0</span></button>
      <button class="nav-icon-btn cart-toggle" style="position:relative"><i class="fas fa-shopping-bag"></i><span class="nav-badge cart-badge" style="display:none">0</span></button>
    </div>
  </div>
</nav>

<div class="container">
  <div class="tracking-page">
    <div style="text-align:center;margin-bottom:56px;">
      <span class="section-label" style="text-align:center;display:block;">Real-time</span>
      <h1 class="section-title">Track Your Order</h1>
      <p style="font-size:14px;color:var(--gray-600);margin-top:12px;">Enter your order ID to see the live status</p>
      <p style="font-size:12px;color:var(--gray-400);margin-top:6px;">Demo: try <strong>MRV-1042</strong> or <strong>MRV-1041</strong></p>
    </div>

    <form class="tracking-search" onsubmit="handleTrack(event)">
      <input id="trackInput" type="text" placeholder="Enter Order ID (e.g. MRV-1042)" required>
      <button type="submit"><i class="fas fa-search"></i> Track</button>
    </form>

    <div id="trackingResult"></div>
  </div>
</div>

<!-- Footer -->
<footer class="footer" style="margin-top:40px;">
  <div class="container">
    <div class="footer-bottom">
      <span class="footer-copy">© 2026 Marvello Store. All rights reserved.</span>
      <div class="footer-socials">
        <a href="https://www.facebook.com/profile.php?id=61572199927543" target="_blank" class="social-link"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/mar_vellostore" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/MarvelloStore" target="_blank" class="social-link"><i class="fab fa-telegram-plane"></i></a>
      </div>
    </div>
  </div>
</footer>

<div class="overlay"></div>
<div class="cart-drawer">
  <div class="drawer-header"><span class="drawer-title">Shopping Bag</span><button class="drawer-close"><i class="fas fa-times"></i></button></div>
  <div class="drawer-body"></div>
  <div class="drawer-footer">
    <div class="drawer-subtotal"><span class="drawer-subtotal-label">Subtotal</span><span class="drawer-subtotal-val">EGP 0</span></div>
    <p class="drawer-note">Shipping & taxes at checkout.</p>
    <a class="drawer-checkout" href="checkout.html">Checkout</a>
  </div>
</div>
<div class="wishlist-drawer">
  <div class="drawer-header"><span class="drawer-title">Wishlist</span><button class="drawer-close" onclick="closeWishlist()"><i class="fas fa-times"></i></button></div>
  <div class="drawer-body"></div>
</div>

<script src="../js/main.js"></script>
<script>
  function handleTrack(e) {
    e.preventDefault();
    const id = document.getElementById('trackInput').value.trim();
    trackOrder(id);
  }
  // Auto-track from URL
  const urlId = new URLSearchParams(window.location.search).get('id');
  if (urlId) { document.getElementById('trackInput').value = urlId; trackOrder(urlId); }
</script>
</body>
</html>
